<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" fill="none" role="img" aria-label="FreeDesign DTF Printing (theme aware)">
  <style>
    :root { --base: #1B1F2A; --muted: rgba(27,31,42,0.12); }
    @media (prefers-color-scheme: dark) {
      :root { --base: #F5F7FF; --muted: rgba(245,247,255,0.14); }
    }
    .baseFill { fill: var(--base); }
    .baseStroke { stroke: var(--base); }
    .mutedStroke { stroke: var(--base); opacity: 0.12; }
    @media (prefers-color-scheme: dark) {
      .mutedStroke { opacity: 0.16; }
      .subtitle { opacity: 0.82; }
    }
    .subtitle { fill: var(--base); opacity: 0.72; }
  </style>

  <!-- Mark -->
  <g transform="translate(70,60)">
    <!-- Ink droplet -->
    <path class="baseFill" d="M90 12C90 12 140 74 140 120C140 152.137 114.137 178 82 178C49.863 178 24 152.137 24 120C24 74 74 12 74 12C78.4 6.6 85.6 6.6 90 12Z"/>
    <!-- Print film (rounded square frame) -->
    <rect class="baseStroke" x="0" y="0" width="180" height="200" rx="36" stroke-width="14"/>
    <!-- Gradient strip (DTF vibe) -->
    <defs>
      <linearGradient id="g" x1="26" y1="160" x2="154" y2="60" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#00D4FF"/>
        <stop offset="0.33" stop-color="#7C5CFF"/>
        <stop offset="0.66" stop-color="#FF3D81"/>
        <stop offset="1" stop-color="#FFB800"/>
      </linearGradient>
      <linearGradient id="g2" x1="6" y1="118" x2="170" y2="118" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#00D4FF"/>
        <stop offset="0.33" stop-color="#7C5CFF"/>
        <stop offset="0.66" stop-color="#FF3D81"/>
        <stop offset="1" stop-color="#FFB800"/>
      </linearGradient>
    </defs>
    <path d="M40 160C60 132 88 118 112 108C136 98 150 80 150 60" stroke="url(#g)" stroke-width="16" stroke-linecap="round"/>
    <circle cx="50" cy="156" r="10" fill="#00D4FF"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(300,92)">
    <text x="0" y="90"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
          font-size="96" font-weight="800" letter-spacing="-1.5" class="baseFill">
      FreeDesign
    </text>

    <!-- Accent underline -->
    <path class="mutedStroke" d="M6 118H420" stroke-width="10" stroke-linecap="round"/>
    <path d="M6 118H170" stroke="url(#g2)" stroke-width="10" stroke-linecap="round"/>

    <text x="0" y="160"
          font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
          font-size="34" font-weight="600" letter-spacing="2.5" class="subtitle">
      DTF PRINTING
    </text>
  </g>
</svg>
